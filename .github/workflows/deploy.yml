name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Debug key fingerprint
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/key
          chmod 600 /tmp/key
          wc -l /tmp/key
          ssh-keygen -y -f /tmp/key > /tmp/key.pub || echo "FAILED TO DERIVE PUBLIC KEY - PRIVATE KEY IS MALFORMED"
          ssh-keygen -lf /tmp/key.pub || true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # The remote key is locked to a forced command (see deploy/deploy.sh
          # and deploy/authorized_keys.example), so this script body is only
          # a placeholder — the server ignores it and always runs deploy.sh.
          script: /opt/fightdfire/deploy.sh
