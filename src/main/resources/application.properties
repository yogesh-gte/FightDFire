spring.application.name=women Safety
 
 
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/womenbesafe?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}

spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Hibernate Properties
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
 
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG
 
 
server.port=8084
 
# Public app URL for links in emails/SMS (override per environment via APP_BASE_URL)
app.base-url=${APP_BASE_URL:http://localhost:8084}
 
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
 
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
 
spring.servlet.multipart.enabled=true
 
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
 
