spring.application.name=Women Safety

# --- Database (override via env: DB_URL, DB_USERNAME, DB_PASSWORD) ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/womenbesafe?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# Hibernate (entity DDL). Prefer Flyway for new changes; keep update until full cutover.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

# Flyway — baselines existing DBs; owns schema_meta + future migrations
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.web=INFO

server.port=8084

# Public app URL for links in emails/SMS
app.base-url=${APP_BASE_URL:http://localhost:8084}
# Extra SockJS/WebSocket origins (comma-separated), e.g. https://staging.example.com
app.ws.allowed-origin-patterns=${WS_ALLOWED_ORIGINS:}

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Errors → AppErrorController → error.jsp (never Whitelabel crash page)
server.error.whitelabel.enabled=false
server.error.path=/error
server.error.include-exception=true
server.error.include-message=always
# Set APP_ERROR_SHOW_DETAILS=false in production to hide cause chain
app.error.show-details=${APP_ERROR_SHOW_DETAILS:true}

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# --- Mail (required for password reset / SOS email). Set via env — never commit real values. ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Razorpay (set via env; leave empty for local until configured) ---
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# --- Google Maps ---
google.maps.apiKey=${GOOGLE_MAPS_API_KEY:}

# --- JWT (must be >= 32 characters in production; rotate if ever leaked) ---
jwt.secret=${JWT_SECRET:FightDFireLocalDevOnlyChangeMeBeforeProd!!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

# --- First admin only (used once when admins table is empty; leave blank after) ---
admin.bootstrap.email=${ADMIN_BOOTSTRAP_EMAIL:}
admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD:}
admin.bootstrap.name=${ADMIN_BOOTSTRAP_NAME:Administrator}

# --- SMS (set SMS_ENABLED=true and configure Twilio or Msg91 for real alerts) ---
sms.enabled=${SMS_ENABLED:false}
sms.provider=${SMS_PROVIDER:twilio}
sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
sms.twilio.phone-number=${TWILIO_PHONE_NUMBER:}
sms.msg91.auth-key=${MSG91_AUTH_KEY:}
sms.msg91.sender-id=${MSG91_SENDER_ID:}
# Portable certificate PDF directory (defaults to {user.dir}/uploads/certificates)
app.certificates.dir=${APP_CERTIFICATES_DIR:}
